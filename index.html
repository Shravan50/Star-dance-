<!DOCTYPE html>
<html>
    <head>
        <script type="module" src="./script.js"></script>
        <link rel="stylesheet" type="text/css" href="styles.css" />
    </head>
    <body class="body">

        <div id="welcome" class="windows">
            <p class="close-button" id="welcomeclose">Close</p>
            <p id="welcomeheader" style="user-select:none;cursor:grab; background-color: #333; padding: 5px; border-radius: 8px;"></p>
            <h1>Welcome to ShravanOS</h1>
            <input type="text" id="nameinput" placeholder="Enter your name" style="padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
            <button id="submitbutton" style="padding: 5px 10px; border: none; background-color: #333; color: white; border-radius: 4px; cursor: pointer;" onclick="document.getElementById('submitbutton').style.display = ''; document.getElementById('nameinput').style.display = ''; document.getElementById('message').style.display=''; document.getElementById('welcomemessage').style.display='';">Submit</button>
            <p id="message"style="display:none"> What's up, <span id="nameDisplay"></span></p> 

        </div>
        
        <div style="display:flex;justify-content: space-between; backdrop-filter: blur(10px);">
            <p style="display: none" id="welcomemessage">
                Welcome, <span id="nameDisplay" ></span>
            </p>
             <p id="welcomeopen" style="cursor:pointer">
                ShravanOS
            </p>
            <p id="TimeElement">
                Time
            </p>
        </div>

        <!-- These are all the desktop apps and their icons -->
        <div class="desktop-apps">
            
            <!-- Camera -->
            <div class="appicons">
                <img id="cameraopen" src="https://static.vecteezy.com/system/resources/thumbnails/006/998/431/small/photo-camera-icons-photo-camera-icon-design-illustration-photo-camera-simple-sign-photo-camera-image-vector.jpg"/>
                <p>Camera</p>
            </div>
            
            <!-- Notes -->
            <div class="appicons">
                <img id="Notesopen" src="https://img.magnific.com/free-vector/yellow-note-paper-with-red-pin_1284-42430.jpg?semt=ais_hybrid&w=740&q=80" />
                <p>Notes</p>
            </div>
            
            <!-- Calculator -->
            <div class="appicons">
                <img id="calculatoropen" src="https://play-lh.googleusercontent.com/mvNKy8HwEF1ntGkqTSopAs_kzxvC9s5TyPvxmF6PAOPP6styrsya1BwN0NGFO_ZeNGuobm8OxHzAbEDNUVDAh1A"/>
                <p>Calculator</p>
            </div>
            
            <!-- Browser--> 
            <div class="appicons">
                <img id="browseropen" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTRTFS_ZcBPnEcyoy933Dzk0GL13cGLNfYFwQ&s"/>
                <p>Browser</p>
            </div>
            
            <!-- Drawing pad-->
            <div class="appicons" style="padding-left:16px;"> 
                <img id="drawingpadopen" src="https://play-lh.googleusercontent.com/RTZ28I0lLnfSNoz2ggB73yt3EyYBuQ4xNj6ubwa5-njbmHw7qxrIwDKQoLi1CtmQp3UEQOe7-8wUDsfItdtOMA" />
                <p>Drawing Pad</p>
            </div>

        </div>


        <div id="camera" class="windows" style="display:none; width: 400px; height: 300px;">
            <p style="cursor: pointer; text-align: left;" id="cameraclose">Close</p>
            <p id="cameraheader" style="user-select:none;cursor:grab; background-color: #333; padding: 5px; border-radius: 30px;">
            </p>
             <button id="startbutton">Allow Camera Access</button>
            <br>
            <video id="video" style="width: 600px; height: 200px; " autoplay></video>
        </div>
        
    
        <div id="Notes" class="windows" style="display:none; width: 400px; height: 300px;">
            <p style="cursor: pointer; text-align: left;" id="Notesclose">Close</p>
            <p id="Notesheader" style="user-select:none;cursor:grab; background-color: #333; padding: 5px; border-radius: 30px;"></p>
            <textarea id="notestextarea" style="width: 100%; height: 80%;background-color: #f0f0f0; border: 1px solid #ccc;"></textarea>
        </div>

        
        <div id="calculator" class="windows" style="width: 200px; height: 300px;display:none">
            <p style="cursor: pointer; text-align: left;" id= "calculatorclose">Close</p>
            <p id="calculatorheader" style="user-select:none;cursor:grab; background-color: #333; padding: 5px; border-radius: 30px;">
            </p>
            <input type="text" id="calculatordisplay" style="width: 100%; height: 40px; background-color: #f0f0f0; border: 1px solid #ccc; text-align: right; padding: 5px; font-size: 18px;" readonly>
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px;">
                <button id="operator"class="calculator-button" data-value="/">/</button> 
                <button class="calculator-button" data-value="7">7</button>
                <button class="calculator-button" data-value="8">8</button>
                <button class="calculator-button" data-value="9">9</button>
                <button id="operator"class="calculator-button" data-value="*">*</button> 
                <button class="calculator-button" data-value="4">4</button> 
                <button class="calculator-button" data-value="5">5</button> 
                <button class="calculator-button" data-value="6">6</button> 
                <button id="operator" class="calculator-button" data-value="-">-</button>
                <button class="calculator-button" data-value="1">1</button> 
                <button class="calculator-button" data-value="2">2</button> 
                <button class="calculator-button" data-value="3">3</button> 
                <button id="operator" class="calculator-button" data-value="+">+</button> 
                <button class="calculator-button" data-value="0" style="grid-column: span 2;">0</button>
                <button class="calculator-button" data-value=".">.</button>
                <button style="grid-column:span 3;" class="calculator-button" data-value="=">enter</button>
                <button class="calculator-button" data-value="AC">AC</button>
            </div> 
        </div> 
        
        <div id="browser" class="windows" style="display:none;width: 500px; height: 300px;background-color: #f0f0f0;">
                <div style="justify-content: space-between;"></div>
                    <p style="cursor: pointer; text-align: left; color:black ;" id="browserclose">Close</p>
                    <p style="color:black">THIS IS A MOCK BROWSER</p>
            <p id="browserheader" style="user-select:none; cursor:grab; background-color: #333; padding: 5px; border-radius: 30px;font-family: Arial, Helvetica, sans-serif;">google.com</p>
            <img src="https://www.pngall.com/wp-content/uploads/15/Google-Search-Bar-Transparent.png" style="width: 400px; height: auto;transform:translateY(-50px)">
        </div>

        <div id="drawingpad" class="windows" style="display:none; width: 400px; height: 300px;">
            <p style="cursor: pointer; text-align: left;" id="drawingpadclose">Close</p>
            <p id="drawingpadheader" style="user-select:none;cursor:grab; background-color: #333; padding: 5px; border-radius: 30px;"></p>
            <canvas id="drawingpadcanvas" width="400" height="250" style="border: 1px solid #ccc;"></canvas>
        </div>
    </body>
        
</html>
